- name: Load Docker
  ansible.builtin.import_role:
    name: common
    tasks_from: docker

- name: Launch Docker Container
  community.docker.docker_container:
    name: frontend
    image: public.ecr.aws/w8x4g9h7/roboshop-v3/frontend
    ports:
      - "80:80"
    env:
     CATALOGUE_HOST: catalogue-dev.maidevops.fun
     CATALOGUE_PORT: "8080"
     USER_HOST: user-dev.maidevops.fun
     USER_PORT: "8080"
     CART_HOST: cart-dev.maidevops.fun
     CART_PORT: "8080"
     SHIPPING_HOST: shipping-dev.maidevops.fun
     SHIPPING_PORT: "8080"
     PAYMENT_HOST: payment-dev.maidevops.fun
     PAYMENT_PORT: "8080"


